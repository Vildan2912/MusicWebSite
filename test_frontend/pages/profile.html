<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyzON - Мой профиль</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/player.css">
    <style>
        .profile-section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 32px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            background: linear-gradient(135deg, #fafaff, #f5f0ff);
            padding: 32px;
            border-radius: 32px;
            border: 1px solid rgba(124, 58, 237, 0.1);
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
        }
        
        .profile-info h1 {
            font-size: 32px;
            margin-bottom: 8px;
            color: #1e1a2f;
        }
        
        .profile-info p {
            color: #7c3aed;
            margin-bottom: 16px;
        }
        
        .profile-badge {
            display: inline-block;
            background: #e9e9ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #5b21b6;
        }
        
        /* Статистика */
        .stats-section {
            background: white;
            border-radius: 24px;
            padding: 24px 32px;
            margin-bottom: 32px;
            border: 1px solid rgba(124, 58, 237, 0.1);
        }
        
        .stats-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #1e1a2f;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }
        
        .stat-card {
            background: #fafaff;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.1);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .stat-label {
            color: #8b8a9e;
            font-size: 13px;
            margin-top: 8px;
        }
        
        /* Настройки */
        .settings-section {
            background: white;
            border-radius: 24px;
            padding: 24px 32px;
            border: 1px solid rgba(124, 58, 237, 0.1);
        }
        
        .settings-section h2 {
            font-size: 20px;
            margin-bottom: 24px;
            color: #1e1a2f;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .settings-form {
            max-width: 500px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4c4b6e;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9e9ff;
            border-radius: 16px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }
        
        .form-group input:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }
        
        .btn-save {
            padding: 12px 28px;
            font-size: 16px;
        }
        
        .settings-message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            display: none;
            font-size: 14px;
        }
        
        .settings-message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        
        .settings-message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
        
        .danger-zone {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #ffebee;
        }
        
        .danger-zone h3 {
            color: #c62828;
            font-size: 16px;
            margin-bottom: 16px;
        }
        
        .btn-danger {
            background: #c62828;
            color: white;
        }
        
        .btn-danger:hover {
            background: #b71c1c;
        }
        
        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">MyzON</div>
        <nav>
            <a href="../index.html">Главная</a>
            <a href="music.html">Каталог</a>
            <a href="listener-cabinet.html">Плейлисты</a>
            <a href="profile.html">Профиль</a>
        </nav>
        <div id="authButtons"></div>
    </header>

    <section class="profile-section">
        <!-- Шапка профиля -->
        <div class="profile-header" id="profileHeader">
            <div class="profile-avatar">
                👤
            </div>
            <div class="profile-info">
                <h1 id="profileName">Загрузка...</h1>
                <p id="profileEmail">-</p>
                <span class="profile-badge" id="profileRole">Слушатель</span>
            </div>
        </div>
        
        <!-- Статистика -->
        <div class="stats-section">
            <h2>📊 Моя статистика</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="statPlaylists">0</div>
                    <div class="stat-label">Плейлистов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statTracks">0</div>
                    <div class="stat-label">Треков в коллекции</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statPlays">0</div>
                    <div class="stat-label">Прослушиваний</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statHours">0</div>
                    <div class="stat-label">Часов прослушивания</div>
                </div>
            </div>
        </div>
        
        <!-- Настройки профиля -->
        <div class="settings-section">
            <h2>⚙️ Настройки профиля</h2>
            <form class="settings-form" id="profileForm">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" placeholder="Введите имя">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Введите email">
                </div>
                <div class="form-group">
                    <label for="newPassword">Новый пароль</label>
                    <input type="password" id="newPassword" placeholder="Оставьте пустым, чтобы не менять">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Подтверждение пароля</label>
                    <input type="password" id="confirmPassword" placeholder="Подтвердите новый пароль">
                </div>
                <button type="submit" class="btn btn-primary btn-save">💾 Сохранить изменения</button>
                <div id="settingsMessage" class="settings-message"></div>
            </form>
            
            <div class="danger-zone">
                <h3>⚠️ Опасная зона</h3>
                <button class="btn btn-danger" onclick="logout()">🚪 Выйти из аккаунта</button>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2024 MyzON. Все права защищены.</p>
    </footer>

    <script src="../js/utils/helpers.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/tracks.js"></script>
    <script src="../js/playlists.js"></script>
    <script src="../js/components/player.js"></script>
    <script src="../js/main.js"></script>
    
    <script>
        // Ключи для хранения статистики
        const STATS_KEY = 'myzon_listening_stats';
        
        // Получение статистики пользователя
        function getUserStats() {
            const user = AuthService.getUser();
            if (!user) return { totalPlays: 0, totalPlayTime: 0 };
            const allStats = JSON.parse(localStorage.getItem(STATS_KEY) || '{}');
            return allStats[user.id] || { totalPlays: 0, totalPlayTime: 0 };
        }
        
        // Обновление отображения статистики
        function updateStatsDisplay() {
            const user = AuthService.getUser();
            if (!user) return;
            
            const playlists = PlaylistsService.getPlaylists();
            const totalTracks = playlists.reduce((sum, p) => sum + p.tracks.length, 0);
            const stats = getUserStats();
            
            document.getElementById('statPlaylists').textContent = playlists.length;
            document.getElementById('statTracks').textContent = totalTracks;
            document.getElementById('statPlays').textContent = stats.totalPlays || 0;
            
            const hours = Math.floor((stats.totalPlayTime || 0) / 3600);
            document.getElementById('statHours').textContent = hours;
        }
        
        // Загрузка данных профиля
        function loadProfile() {
            const user = AuthService.getUser();
            if (!user) return;
            
            document.getElementById('profileName').textContent = user.username || user.email?.split('@')[0] || 'Слушатель';
            document.getElementById('profileEmail').textContent = user.email || '-';
            
            // Загружаем сохранённые данные из localStorage (если есть)
            const savedProfile = JSON.parse(localStorage.getItem('myzon_user_profile') || '{}');
            document.getElementById('username').value = savedProfile.username || user.username || '';
            document.getElementById('email').value = savedProfile.email || user.email || '';
        }
        
        // Сохранение профиля
        function saveProfile(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('settingsMessage');
            
            // Валидация
            if (!username || !email) {
                messageDiv.textContent = '❌ Заполните имя и email';
                messageDiv.className = 'settings-message error';
                setTimeout(() => {
                    messageDiv.className = 'settings-message';
                }, 3000);
                return;
            }
            
            if (newPassword) {
                if (newPassword.length < 6) {
                    messageDiv.textContent = '❌ Пароль должен быть не менее 6 символов';
                    messageDiv.className = 'settings-message error';
                    setTimeout(() => {
                        messageDiv.className = 'settings-message';
                    }, 3000);
                    return;
                }
                if (newPassword !== confirmPassword) {
                    messageDiv.textContent = '❌ Пароли не совпадают';
                    messageDiv.className = 'settings-message error';
                    setTimeout(() => {
                        messageDiv.className = 'settings-message';
                    }, 3000);
                    return;
                }
            }
            
            // Получаем текущего пользователя
            const user = AuthService.getUser();
            if (user) {
                // Обновляем данные
                const updatedUser = {
                    ...user,
                    username: username,
                    email: email
                };
                
                if (newPassword) {
                    updatedUser.password = newPassword;
                }
                
                // Сохраняем в AuthService
                const token = AuthService.getToken();
                AuthService.setSession(token, updatedUser);
                
                // Сохраняем дополнительные данные
                localStorage.setItem('myzon_user_profile', JSON.stringify({ username, email }));
                
                // Очищаем поля пароля
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                
                messageDiv.textContent = '✅ Профиль успешно обновлён!';
                messageDiv.className = 'settings-message success';
                
                // Обновляем отображение шапки профиля
                document.getElementById('profileName').textContent = username;
                document.getElementById('profileEmail').textContent = email;
                
                // Обновляем UI в шапке сайта
                updateAuthUI();
                
                setTimeout(() => {
                    messageDiv.className = 'settings-message';
                }, 3000);
            }
        }
        
        // Выход из аккаунта
        function logout() {
            if (confirm('Вы уверены, что хотите выйти?')) {
                AuthService.logout();
                window.location.href = '../index.html';
            }
        }
        
        // Проверка авторизации
        function checkAuth() {
            if (!AuthService.isAuthenticated()) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAuth()) return;
            
            updateAuthUI();
            loadProfile();
            updateStatsDisplay();
            
            // Обработчик формы
            const profileForm = document.getElementById('profileForm');
            if (profileForm) {
                profileForm.addEventListener('submit', saveProfile);
            }
        });
    </script>
</body>
</html>
