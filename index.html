<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyzON</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Шапка -->
    <header>
        <div class="logo">MyzON</div>
        <nav>
            <a href="#">Главная</a>
            <a href="#">Каталог</a>
            <a href="#">Плейлисты</a>
        </nav>
        <div>
            <button class="btn">Войти</button>
            <button class="btn btn-primary">Регистрация</button>
        </div>
    </header>

    <!-- Главная секция -->
    <section class="hero">
        <h1>Слушай музыку <br><span>без границ</span></h1>
        <p>Миллионы треков. Офлайн-доступ. Без рекламы.</p>
        <div>
            <button class="btn btn-primary btn-large">Начать</button>
            <button class="btn btn-large">Подробнее</button>
        </div>
    </section>

    <!-- Карточки -->
    <section class="cards">
        <div class="card">
            <h3>🎵 Миллионы треков</h3>
            <p>Вся музыка в одном месте</p>
        </div>
        <div class="card">
            <h3>📱 Офлайн-режим</h3>
            <p>Слушай без интернета</p>
        </div>
        <div class="card">
            <h3>🎧 Премиум</h3>
            <p>Без рекламы и в HD</p>
            <button class="btn btn-primary">Оформить</button>
        </div>
    </section>

    <!-- Подвал -->
    <footer>
        <p>© 2024 MyzON. Все права защищены.</p>
    </footer>
</body>
</html>
