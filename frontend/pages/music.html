<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyzON - Каталог музыки</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/player.css">
    <style>
        .catalog-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0px 20px 40px;
        }
        
        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .catalog-header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #1e1a2f, #6d28d9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .catalog-filters {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .catalog-filters select,
        .catalog-filters input {
            padding: 10px 16px;
            border: 2px solid #e9e9ff;
            border-radius: 40px;
            font-family: inherit;
            background: white;
            font-size: 14px;
        }
        
        .catalog-filters input {
            min-width: 220px;
        }
        
        .catalog-filters select:focus,
        .catalog-filters input:focus {
            outline: none;
            border-color: #7c3aed;
        }
        
        /* Таблица треков - как в проводнике */
        .tracks-table-container {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(124, 58, 237, 0.1);
        }
        
        .tracks-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .tracks-table th {
            text-align: left;
            padding: 16px 20px;
            background: #fafaff;
            color: #5b21b6;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #f0f0ff;
        }
        
        .tracks-table td {
            padding: 12px 20px;
            border-bottom: 1px solid #f0f0ff;
            color: #1e1a2f;
            vertical-align: middle;
        }
        
        .tracks-table tr {
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .tracks-table tr:hover {
            background: #fafaff;
        }
        
        .track-cover-small {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 12px;
            vertical-align: middle;
        }
        
        .track-info-cell {
            display: flex;
            align-items: center;
        }
        
        .track-title-cell {
            font-weight: 600;
            color: #1e1a2f;
        }
        
        .track-artist-cell {
            font-size: 13px;
            color: #7c3aed;
            margin-top: 2px;
        }
        
        .track-duration {
            color: #8b8a9e;
            font-size: 14px;
        }
        
        .actions-cell {
            white-space: nowrap;
        }
        
        .actions-cell .btn {
            padding: 6px 12px;
            font-size: 12px;
            margin: 0 4px;
        }
        
        .actions-cell .btn-play {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b8a9e;
        }
        
        .empty-state h3 {
            margin-bottom: 16px;
            color: #1e1a2f;
        }
        
        /* Адаптив для мобильных */
        @media (max-width: 768px) {
            .tracks-table th:nth-child(3),
            .tracks-table td:nth-child(3) {
                display: none;
            }
            
            .tracks-table th:nth-child(4),
            .tracks-table td:nth-child(4) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">MyzON</div>
        <nav>
			<a href="../index.html">Главная</a>
			<a href="music.html">Каталог</a>
			<a href="listener-cabinet.html">Плейлисты</a>
			<a href="profile.html">Профиль</a>
		</nav>
        <div id="authButtons"></div>
    </header>

    <section class="catalog-section">
        <div class="catalog-header">
            <h1>🎵 Каталог музыки</h1>
            <div class="catalog-filters">
                <select id="genreFilter">
                    <option value="all">Все жанры</option>
                    <option value="pop">Поп-музыка</option>
                    <option value="rock">Рок</option>
                    <option value="jazz">Джаз</option>
                    <option value="classical">Классика</option>
                    <option value="electronic">Электроника</option>
                </select>
                <input type="text" id="searchInput" placeholder="🔍 Поиск треков или исполнителей...">
            </div>
        </div>
        
        <div class="tracks-table-container" id="catalogTracksContainer">
            <!-- Таблица будет загружена динамически -->
            <div class="empty-state">Загрузка треков...</div>
        </div>
    </section>

    <footer>
        <p>© 2024 MyzON. Все права защищены.</p>
    </footer>

    <script src="../js/utils/helpers.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/tracks.js"></script>
    <script src="../js/components/player.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/playlists.js"></script>
    
    <script>
        window.catalogTracks = [];
        
        async function loadCatalog() {
            const container = document.getElementById('catalogTracksContainer');
            if (!container) return;
            
            const genreFilter = document.getElementById('genreFilter');
            const searchInput = document.getElementById('searchInput');
            
            async function fetchAndRender() {
                const filters = {
                    genre: genreFilter?.value || 'all',
                    search: searchInput?.value || ''
                };
                
                try {
                    const tracks = await TracksService.getTracks(filters);
                    window.catalogTracks = tracks;
                    
                    if (tracks.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <h3>😢 Ничего не найдено</h3>
                                <p>Попробуйте изменить параметры поиска</p>
                            </div>
                        `;
                        return;
                    }
                    
                    // Рендерим таблицу
                    container.innerHTML = `
                        <table class="tracks-table">
                            <thead>
                                <tr>
                                    <th>ТРЕК</th>
                                    <th>ИСПОЛНИТЕЛЬ</th>
                                    <th>ЖАНР</th>
                                    <th>ДЛИТЕЛЬНОСТЬ</th>
                                    <th>ДЕЙСТВИЯ</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tracks.map(track => `
                                    <tr onclick="goToTrack(${track.id})">
                                        <td>
                                            <div class="track-info-cell">
                                                <img src="${track.cover}" class="track-cover-small" 
                                                     onerror="this.src='https://picsum.photos/id/100/40/40'">
                                                <div>
                                                    <div class="track-title-cell">${escapeHtml(track.title)}</div>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="track-artist-cell">${escapeHtml(track.artist)}</td>
                                        <td>${getGenreName(track.genre)}</td>
                                        <td class="track-duration">${track.duration}</td>
                                        <td class="actions-cell" onclick="event.stopPropagation()">
                                            <button class="btn btn-play" onclick="playTrack(${track.id})" title="Воспроизвести">▶</button>
                                            <button class="btn" onclick="showAddToPlaylistModal(${track.id})" title="Добавить в плейлист">➕</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                } catch (error) {
                    console.error('Ошибка загрузки треков:', error);
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>⚠️ Ошибка загрузки</h3>
                            <p>Не удалось загрузить треки. Попробуйте позже.</p>
                        </div>
                    `;
                }
            }
            
            // Функция для получения названия жанра на русском
            function getGenreName(genre) {
                const genres = {
                    pop: '🎤 Поп',
                    rock: '🎸 Рок',
                    jazz: '🎷 Джаз',
                    classical: '🎻 Классика',
                    electronic: '🎛 Электроника',
                    hiphop: '🎧 Хип-хоп'
                };
                return genres[genre] || genre;
            }
            
            // Переход на страницу трека
            window.goToTrack = function(trackId) {
                window.location.href = `track.html?id=${trackId}`;
            };
            
            // Воспроизведение трека
            window.playTrack = function(trackId) {
                const track = window.catalogTracks.find(t => t.id === trackId);
                if (track && window.player) {
                    window.player.playTrack(track, window.catalogTracks);
                }
            };
            
            // Добавление в плейлист
            window.showAddToPlaylistModal = async function(trackId) {
                if (!AuthService.isAuthenticated()) {
                    alert('Войдите в систему, чтобы добавлять треки в плейлисты');
                    window.location.href = 'login.html';
                    return;
                }
                
                const track = window.catalogTracks.find(t => t.id === trackId);
                if (!track) return;
                
                const playlists = PlaylistsService.getPlaylists();
                if (playlists.length === 0) {
                    if (confirm('У вас нет плейлистов. Создать сейчас?')) {
                        window.location.href = 'listener-cabinet.html';
                    }
                    return;
                }
                
                // Простой выбор плейлиста через prompt с номерами
                let playlistOptions = playlists.map((p, i) => `${i + 1}. ${p.name} (${p.tracks.length} треков)`).join('\n');
                const choice = prompt(`Выберите плейлист для добавления трека "${track.title}":\n\n${playlistOptions}\n\nВведите номер или название плейлиста:`);
                
                if (choice) {
                    let selectedPlaylist = null;
                    // Проверяем, ввели ли номер
                    const numIndex = parseInt(choice) - 1;
                    if (!isNaN(numIndex) && numIndex >= 0 && numIndex < playlists.length) {
                        selectedPlaylist = playlists[numIndex];
                    } else {
                        selectedPlaylist = playlists.find(p => p.name.toLowerCase() === choice.toLowerCase());
                    }
                    
                    if (selectedPlaylist) {
                        const added = PlaylistsService.addTrackToPlaylist(selectedPlaylist.id, track);
                        if (added) {
                            alert(`✅ Трек "${track.title}" добавлен в плейлист "${selectedPlaylist.name}"!`);
                        } else {
                            alert(`⚠️ Трек "${track.title}" уже есть в плейлисте "${selectedPlaylist.name}"!`);
                        }
                    } else {
                        alert('Плейлист не найден');
                    }
                }
            };
            
            // Навешиваем обработчики фильтров
            if (genreFilter) {
                genreFilter.addEventListener('change', fetchAndRender);
            }
            if (searchInput) {
                const debouncedSearch = debounce(fetchAndRender, 500);
                searchInput.addEventListener('input', debouncedSearch);
            }
            
            await fetchAndRender();
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            updateAuthUI();
            await loadCatalog();
        });
    </script>
</body>
</html>
