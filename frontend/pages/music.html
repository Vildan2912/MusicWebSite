<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyzON - Каталог музыки</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/player.css">
    <style>
        .catalog-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .catalog-header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #1e1a2f, #6d28d9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .catalog-filters {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .catalog-filters select,
        .catalog-filters input {
            padding: 10px 16px;
            border: 2px solid #e9e9ff;
            border-radius: 40px;
            font-family: inherit;
            background: white;
        }
        
        .catalog-filters input {
            min-width: 200px;
        }
        
        .catalog-filters select:focus,
        .catalog-filters input:focus {
            outline: none;
            border-color: #7c3aed;
        }
        
        .tracks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }
        
        .track-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid rgba(124, 58, 237, 0.1);
        }
        
        .track-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(124, 58, 237, 0.12);
        }
        
        .track-cover {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        
        .track-info {
            padding: 16px;
        }
        
        .track-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
            color: #1e1a2f;
        }
        
        .track-artist {
            font-size: 14px;
            color: #7c3aed;
            margin-bottom: 8px;
        }
        
        .track-duration {
            font-size: 12px;
            color: #8b8a9e;
            margin-bottom: 12px;
        }
        
        .track-actions {
            display: flex;
            gap: 8px;
        }
        
        .track-actions .btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }
        
        .track-card-link {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">MyzON</div>
        <nav>
            <a href="../index.html">Главная</a>
            <a href="music.html">Каталог</a>
            <a href="listener-cabinet.html">Плейлисты</a>
        </nav>
        <div id="authButtons"></div>
    </header>

    <section class="catalog-section">
        <div class="catalog-header">
            <h1>🎵 Каталог музыки</h1>
            <div class="catalog-filters">
                <select id="genreFilter">
                    <option value="all">Все жанры</option>
                    <option value="pop">Поп-музыка</option>
                    <option value="rock">Рок</option>
                    <option value="jazz">Джаз</option>
                    <option value="classical">Классика</option>
                </select>
                <input type="text" id="searchInput" placeholder="Поиск треков или исполнителей...">
            </div>
        </div>
        
        <div class="tracks-grid" id="catalogTracksGrid"></div>
    </section>

    <footer>
        <p>© 2024 MyzON. Все права защищены.</p>
    </footer>

    <script src="../js/utils/helpers.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/tracks.js"></script>
    <script src="../js/components/player.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/playlists.js"></script>
    <script>
        window.catalogTracks = [];
				
        async function loadCatalog() {
            const container = document.getElementById('catalogTracksGrid');
            if (!container) return;
            
            const genreFilter = document.getElementById('genreFilter');
            const searchInput = document.getElementById('searchInput');
            
            async function fetchAndRender() {
                const filters = {
                    genre: genreFilter?.value || 'all',
                    search: searchInput?.value || ''
                };
                
                try {
                    const tracks = await TracksService.getTracks(filters);
                    window.catalogTracks = tracks;
                    
                    container.innerHTML = '';
                    if (tracks.length === 0) {
                        container.innerHTML = '<p style="text-align:center; padding:40px;">Ничего не найдено 😢</p>';
                        return;
                    }
                    
                    tracks.forEach(track => {
                        const card = document.createElement('div');
                        card.className = 'track-card';
                        card.innerHTML = `
                            <a href="track.html?id=${track.id}" class="track-card-link">
                                <img src="${track.cover}" alt="${track.title}" class="track-cover">
                            </a>
                            <div class="track-info">
                                <a href="track.html?id=${track.id}" class="track-card-link">
                                    <div class="track-title">${escapeHtml(track.title)}</div>
                                    <div class="track-artist">${escapeHtml(track.artist)}</div>
                                    <div class="track-duration">${track.duration}</div>
                                </a>
                                <div class="track-actions">
                                    <button class="btn btn-primary play-now-btn" data-id="${track.id}">▶ Воспроизвести</button>
                                    <button class="btn add-to-playlist-btn" data-id="${track.id}">➕</button>
                                </div>
                            </div>
                        `;
                        
                        const playBtn = card.querySelector('.play-now-btn');
                        playBtn.addEventListener('click', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            playTrack(track.id, tracks);
                        });
                        
                        const addBtn = card.querySelector('.add-to-playlist-btn');
						addBtn.addEventListener('click', (e) => {
							e.preventDefault();
							e.stopPropagation();
							showAddToPlaylistModal(track);
						});
                        
                        container.appendChild(card);
                    });
                } catch (error) {
                    container.innerHTML = '<p style="text-align:center; padding:40px;">Ошибка загрузки треков</p>';
                }
            }
            
            if (genreFilter) {
                genreFilter.addEventListener('change', fetchAndRender);
            }
            
            if (searchInput) {
                const debouncedSearch = debounce(fetchAndRender, 500);
                searchInput.addEventListener('input', debouncedSearch);
            }
            
            await fetchAndRender();
        }
        
        function playTrack(trackId, playlist) {
            const track = playlist.find(t => t.id === trackId);
            if (track && window.player) {
                window.player.playTrack(track, playlist);
            }
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            updateAuthUI();
            await loadCatalog();
        });
        
        let currentPlaylistForAdding = null;

		async function showAddToPlaylistModal(track) {
			if (!AuthService.isAuthenticated()) {
				alert('Войдите в систему, чтобы добавлять треки в плейлисты');
				window.location.href = 'login.html';
				return;
			}
			
			const playlists = PlaylistsService.getPlaylists();
			if (playlists.length === 0) {
				if (confirm('У вас нет плейлистов. Создать сейчас?')) {
					window.location.href = 'listener-cabinet.html';
				}
				return;
			}
			
			const playlistNames = playlists.map(p => p.name).join('\n');
			const playlistId = prompt(`Выберите плейлист для добавления трека "${track.title}":\n\n${playlistNames}\n\nВведите название плейлиста:`);
			
			if (playlistId) {
				const playlist = playlists.find(p => p.name.toLowerCase() === playlistId.toLowerCase());
				if (playlist) {
					const added = PlaylistsService.addTrackToPlaylist(playlist.id, track);
					if (added) {
						alert(`Трек "${track.title}" добавлен в плейлист "${playlist.name}"!`);
					} else {
						alert('Этот трек уже есть в плейлисте!');
					}
				} else {
					alert('Плейлист не найден');
				}
			}
		}
    </script>
</body>
</html>
