<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyzON - Мои плейлисты</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/player.css">
    <style>
        .cabinet-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0px 20px 40px;
        }
        
        .cabinet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .cabinet-header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #1e1a2f, #6d28d9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .create-playlist-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            font-size: 16px;
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1100;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            margin-bottom: 24px;
            color: #1e1a2f;
        }
        
        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e9e9ff;
            border-radius: 20px;
            font-size: 16px;
            margin-bottom: 16px;
            font-family: inherit;
            box-sizing: border-box;
        }
        
        .modal-content input:focus,
        .modal-content textarea:focus {
            outline: none;
            border-color: #7c3aed;
        }
        
        .modal-content textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        /* Плейлисты */
        .playlists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        
        .playlist-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(124, 58, 237, 0.1);
            cursor: pointer;
        }
        
        .playlist-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(124, 58, 237, 0.12);
        }
        
        .playlist-cover {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
        }
        
        .playlist-info {
            padding: 16px;
        }
        
        .playlist-name {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 8px;
            color: #1e1a2f;
        }
        
        .playlist-meta {
            font-size: 13px;
            color: #8b8a9e;
            margin-bottom: 12px;
        }
        
        .playlist-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .playlist-actions .btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b8a9e;
        }
        
        .empty-state h3 {
            margin-bottom: 16px;
            color: #1e1a2f;
        }
        
        .empty-state .btn {
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">MyzON</div>
        <nav>
			<a href="../index.html">Главная</a>
			<a href="music.html">Каталог</a>
			<a href="listener-cabinet.html">Плейлисты</a>
			<a href="profile.html">Профиль</a>
		</nav>
        <div id="authButtons"></div>
    </header>

    <section class="cabinet-section">
        <div class="cabinet-header">
            <h1>📀 Мои плейлисты</h1>
            <button class="btn btn-primary create-playlist-btn" onclick="openCreatePlaylistModal()">
                ➕ Создать плейлист
            </button>
        </div>
        
        <div id="playlistsContainer" class="playlists-grid"></div>
    </section>

    <!-- Модальное окно создания/редактирования плейлиста -->
    <div id="playlistModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Создать плейлист</h2>
            <input type="text" id="playlistName" placeholder="Название плейлиста">
            <textarea id="playlistDescription" placeholder="Описание (необязательно)"></textarea>
            <div class="modal-actions">
                <button class="btn" onclick="closePlaylistModal()">Отмена</button>
                <button class="btn btn-primary" onclick="savePlaylist()">Сохранить</button>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2024 MyzON. Все права защищены.</p>
    </footer>

    <script src="../js/utils/helpers.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/tracks.js"></script>
    <script src="../js/playlists.js"></script>
    <script src="../js/components/player.js"></script>
    <script src="../js/main.js"></script>
    
    <script>
        let currentEditPlaylistId = null;
        
        // Проверка авторизации
        function checkAuth() {
            if (!AuthService.isAuthenticated()) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }
        
        // Загрузка плейлистов
        function loadPlaylists() {
            const container = document.getElementById('playlistsContainer');
            if (!container) return;
            
            const playlists = PlaylistsService.getPlaylists();
            
            if (playlists.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>🎵 У вас пока нет плейлистов</h3>
                        <p>Создайте первый плейлист и добавляйте любимые треки!</p>
                        <button class="btn btn-primary" onclick="openCreatePlaylistModal()">
                            ➕ Создать плейлист
                        </button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = playlists.map(playlist => `
                <div class="playlist-card" onclick="window.location.href='playlist-detail.html?id=${playlist.id}'">
                    <img src="${playlist.cover}" class="playlist-cover">
                    <div class="playlist-info">
                        <div class="playlist-name">${escapeHtml(playlist.name)}</div>
                        <div class="playlist-meta">
                            ${playlist.tracks.length} ${getTracksText(playlist.tracks.length)} • 
                            ${formatDate(playlist.updatedAt)}
                        </div>
                        <div class="playlist-actions" onclick="event.stopPropagation()">
                            <button class="btn" onclick="openEditPlaylistModal(${playlist.id})">✏️ Ред.</button>
                            <button class="btn btn-primary" onclick="playPlaylist(${playlist.id})">▶ Играть</button>
                            <button class="btn" onclick="deletePlaylist(${playlist.id})">🗑 Удалить</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function getTracksText(count) {
            if (count % 10 === 1 && count % 100 !== 11) return 'трек';
            if (count % 10 >= 2 && count % 10 <= 4 && (count % 100 < 10 || count % 100 >= 20)) return 'трека';
            return 'треков';
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'сегодня';
            if (diffDays === 1) return 'вчера';
            if (diffDays < 7) return `${diffDays} дня назад`;
            return date.toLocaleDateString('ru-RU');
        }
        
        // Открытие модального окна создания
        function openCreatePlaylistModal() {
            currentEditPlaylistId = null;
            document.getElementById('modalTitle').textContent = 'Создать плейлист';
            document.getElementById('playlistName').value = '';
            document.getElementById('playlistDescription').value = '';
            document.getElementById('playlistModal').classList.add('active');
        }
        
        // Открытие модального окна редактирования
        function openEditPlaylistModal(playlistId) {
            const playlist = PlaylistsService.getPlaylistById(playlistId);
            if (!playlist) return;
            
            currentEditPlaylistId = playlistId;
            document.getElementById('modalTitle').textContent = 'Редактировать плейлист';
            document.getElementById('playlistName').value = playlist.name;
            document.getElementById('playlistDescription').value = playlist.description || '';
            document.getElementById('playlistModal').classList.add('active');
        }
        
        // Закрытие модального окна
        function closePlaylistModal() {
            document.getElementById('playlistModal').classList.remove('active');
            currentEditPlaylistId = null;
        }
        
        // Сохранение плейлиста
        function savePlaylist() {
            const name = document.getElementById('playlistName').value.trim();
            const description = document.getElementById('playlistDescription').value;
            
            if (!name) {
                alert('Введите название плейлиста');
                return;
            }
            
            if (currentEditPlaylistId) {
                PlaylistsService.updatePlaylist(currentEditPlaylistId, { name, description });
            } else {
                PlaylistsService.createPlaylist(name, description);
            }
            
            closePlaylistModal();
            loadPlaylists();
        }
        
        // Удаление плейлиста
        function deletePlaylist(playlistId) {
            if (confirm('Вы уверены, что хотите удалить этот плейлист?')) {
                PlaylistsService.deletePlaylist(playlistId);
                loadPlaylists();
            }
        }
        
        // Воспроизведение всего плейлиста
        function playPlaylist(playlistId) {
            const playlist = PlaylistsService.getPlaylistById(playlistId);
            if (playlist && playlist.tracks.length > 0 && window.player) {
                window.player.playTrack(playlist.tracks[0], playlist.tracks);
            } else if (playlist && playlist.tracks.length === 0) {
                alert('В плейлисте нет треков. Добавьте треки из каталога!');
            }
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAuth()) return;
            
            updateAuthUI();
            loadPlaylists();
            
            // Закрытие модального окна по клику вне его
            document.getElementById('playlistModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('playlistModal')) {
                    closePlaylistModal();
                }
            });
        });
    </script>
</body>
</html>
